# Modified version of workflow copied from https://github.com/jax-md/jax-md
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: CI

on:
  push:
    branches:
      - main
      - master
      - "test_*"
  pull_request:
    branches:
      - main
      - master

jobs:
  build-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install package and test dependencies
        run: |
          uv pip install .[test]
          uv pip install build
      - name: Build distributions
        run: uv run python -m build
      - name: Import package
        run: uv run python -c "import jaxparamopt; print(jaxparamopt.__version__)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Create virtual environment
        run: uv venv --python 3.11
      - name: Install lint dependencies
        run: uv pip install .[lint]
      - name: Run Ruff
        run: |
          uv run ruff check jaxparamopt/config.py jaxparamopt/driver.py jaxparamopt/input.py jaxparamopt/backends tests/config_test.py tests/driver_test.py tests/input_test.py
          uv run ruff format --check jaxparamopt/config.py jaxparamopt/driver.py jaxparamopt/input.py jaxparamopt/backends tests/config_test.py tests/driver_test.py tests/input_test.py

  interface-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install test dependencies
        run: uv pip install .[test]
      - name: Run interface tests
        run: uv run python -m pytest tests/config_test.py tests/driver_test.py tests/input_test.py --cov=jaxparamopt --cov-report=xml --cov-report=term

  reaxff-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install JAX and test dependencies
        run: uv pip install .[jax,test]
      - name: Run ReaxFF regression test
        run: uv run python -m pytest tests/reaxff_energy_test.py
