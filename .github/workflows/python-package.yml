name: Python package

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependencies
        run: python -m pip install --upgrade pip ".[lint]"
      - name: Run Ruff
        run: |
          ruff check setup.py jaxparamopt/__init__.py
          ruff format --check setup.py jaxparamopt/__init__.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --upgrade pip ".[jax,test]"
      - name: Run tests
        env:
          JAX_ENABLE_X64: "1"
        run: pytest --cov=jaxparamopt --cov-report=xml --cov-report=term
